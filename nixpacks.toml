[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.build]
dependsOn = ["setup"]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
cmd = "npm run build && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host 0.0.0.0 --port $PORT"

