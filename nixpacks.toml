[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.build]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install", "npm run build"]

[phases.postBuild]
# Tenta rodar a migração logo após o build
cmds = ["php artisan migrate --force --seed"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
